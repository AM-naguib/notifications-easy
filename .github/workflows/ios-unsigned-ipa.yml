name: Build iOS Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "ios/**"
      - ".github/workflows/ios-unsigned-ipa.yml"

jobs:
  build-ios:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Show Xcode environment
        working-directory: ios
        run: |
          xcodebuild -version
          xcodebuild -list -project EasyOrders.xcodeproj

      - name: Build unsigned app for iPhone devices
        working-directory: ios
        run: |
          set -euo pipefail
          mkdir -p build
          xcodebuild \
            -project EasyOrders.xcodeproj \
            -scheme EasyOrders \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            clean build | tee build/xcodebuild.log

      - name: Package unsigned IPA
        working-directory: ios
        run: |
          set -euo pipefail
          APP_PATH="build/DerivedData/Build/Products/Release-iphoneos/EasyOrders.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Expected app bundle not found at $APP_PATH"
            exit 1
          fi

          rm -rf build/Payload
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          cd build
          zip -qry EasyOrders-unsigned.ipa Payload

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: EasyOrders-unsigned-ipa
          path: ios/build/EasyOrders-unsigned.ipa
          if-no-files-found: error
          retention-days: 7

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: EasyOrders-build-logs
          path: ios/build/xcodebuild.log
          if-no-files-found: warn
          retention-days: 7
