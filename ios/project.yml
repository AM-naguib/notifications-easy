name: EasyOrders
options:
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.0
targets:
  EasyOrders:
    type: application
    platform: iOS
    sources:
      - path: EasyOrders/Sources
    resources:
      - path: EasyOrders/Resources
        excludes:
          - Info.plist
    info:
      path: EasyOrders/Resources/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.easyorders.app
        PRODUCT_NAME: EasyOrders
        INFOPLIST_FILE: EasyOrders/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
